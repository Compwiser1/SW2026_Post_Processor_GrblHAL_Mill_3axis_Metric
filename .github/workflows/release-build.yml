name: Build and Draft Release (Source Only)

# Triggers on any tag push matching v*.*.* (e.g. v1.0.0). Typical flow is:
#   1. Bump post.json "version" and the .SRC file's "Post Version:" stamp
#      together (see .scripts/bump-release.sh)
#   2. Commit as: chore: create new release vX.X.X
#   3. Tag the commit: git tag vX.X.X
#   4. Push both: git push && git push --tags
# The push of the tag is what triggers this workflow.
#
# Versioning is plain semver (X.Y.Z), matching the ncSender plugin repo's
# scheme — post.json is the source of truth, and the .SRC file's plain,
# free-form "; Post Version: X.Y.Z" comment line is kept in sync with it by
# .scripts/bump-release.sh.
#
# IMPORTANT: The .ctl binary CANNOT be built here. The UPG-2 Post Processor
# Editor is a local, GUI-only, Windows-side compiler with no CLI/API — it
# does not exist in this runner's environment. This workflow validates
# source (tag/version match, compile-tripwire stamp, per-file content
# sanity) and creates an EMPTY DRAFT release — no zip is built here, since
# the final release archive includes the compiled .ctl, which doesn't
# exist yet at this point. The release stays a draft, unpublished and not
# publicly visible, until you have:
#   1. Compiled the .ctl locally in the Post Processor Editor
#   2. Confirmed the version stamp posts correctly (the compile tripwire)
#   3. Posted a test job and reviewed the NC output
#   4. Run it on FrankenOKO and confirmed no gouging / correct behavior
#   5. Run .scripts/attach-ctl.sh, which builds the single release zip
#      (.SRC/.LIB/.lng/LICENSE/.ctl), attaches it, and publishes
#
# Never bypass the draft gate. A published release with no attached zip,
# or one attached from an untested compile, is a released hazard, not a
# convenience.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read post id and version from post.json
        id: post
        run: |
          POST_ID=$(jq -r '.id' post.json)
          MANIFEST_VERSION=$(jq -r '.version' post.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "Post ID: $POST_ID"
          echo "post.json version: $MANIFEST_VERSION"
          echo "Tag version: $TAG_VERSION"

          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match post.json version ${MANIFEST_VERSION}. Update post.json before tagging."
            exit 1
          fi

          echo "post_id=$POST_ID" >> "$GITHUB_OUTPUT"
          echo "version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify .SRC version stamp matches post.json
        run: |
          VERSION="${{ steps.post.outputs.version }}"
          SRC_FILE=$(find . -maxdepth 1 -name '*.SRC' | head -n1)

          if [ -z "$SRC_FILE" ]; then
            echo "::error::No .SRC file found at repo root."
            exit 1
          fi

          if ! grep -q "; Post Version: ${VERSION}" "$SRC_FILE"; then
            echo "::error::${SRC_FILE} does not contain the stamp '; Post Version: ${VERSION}'. The .SRC stamp and post.json have drifted apart — fix before tagging (run .scripts/bump-release.sh, don't hand-edit the stamp). This check exists because the compile tripwire only works if the two agree."
            exit 1
          fi

          echo "Stamp verified: Post Version: ${VERSION} found in ${SRC_FILE}"

      - name: Sanity-check that each file's content actually matches its filename
        run: |
          # Added after a real incident: files were dragged/uploaded via a
          # method that silently cross-mixed content between files (e.g.
          # post.json ended up containing CLAUDE.md's text, SW26_*.LIB ended
          # up containing post.json's text, etc.) — each file existed, had a
          # plausible size, and wasn't empty, so nothing upstream of this
          # caught it. This step checks a distinctive signature inside each
          # file's actual content, not just that the file exists.
          FAIL=0

          check() {
            local file="$1" pattern="$2" desc="$3"
            if [ ! -f "$file" ]; then
              echo "::error::Missing file: $file"
              FAIL=1
              return
            fi
            if ! head -20 "$file" | grep -qE "$pattern"; then
              echo "::error::$file does not look like $desc (expected to find pattern '$pattern' in the first 20 lines). This file's content may have been swapped with another file's — check what's actually in it before re-tagging."
              FAIL=1
            fi
          }

          SRC_FILE=$(find . -maxdepth 1 -name '*.SRC' | head -n1)
          LIB_FILE=$(find . -maxdepth 1 -name '*.LIB' | head -n1)
          LNG_FILE=$(find . -maxdepth 1 -name '*.lng' | head -n1)

          check "$SRC_FILE" '^\*FANUCM' "UPG-2 post source (should start with *FANUCM)"
          check "$LIB_FILE" ':ATTRNAME=' "UPG-2 attribute library (should contain :ATTRNAME=)"
          check "$LNG_FILE" ':[0-9]{4}:' "UPG-2 language file (should contain :NNNN: entries)"
          check "post.json" '"id"[[:space:]]*:' "the version manifest (should contain an \"id\" field)"
          check "CLAUDE.md" '^# CLAUDE\.md' "Claude Code instructions (should start with '# CLAUDE.md')"
          check ".scripts/bump-release.sh" '^#!/usr/bin/env bash' "a shell script (should start with a bash shebang)"
          check ".scripts/attach-ctl.sh" '^#!/usr/bin/env bash' "a shell script (should start with a bash shebang)"

          if [ "$FAIL" -eq 1 ]; then
            echo "::error::One or more files failed the content sanity check. Refusing to build a release from mismatched source. Fix the affected file(s) locally, re-commit, delete and re-push the tag."
            exit 1
          fi

          echo "All checked files contain their expected content signatures."

      - name: Create draft GitHub Release
        run: |
          POST_ID="${{ steps.post.outputs.post_id }}"
          VERSION="${{ steps.post.outputs.version }}"
          TAG="${{ github.ref_name }}"

          # NOTE: [EXPERIMENTAL] is intentional and temporary — remove this
          # suffix from the release title once the project leaves its
          # experimental phase (maintainer's call, not automatic).
          TITLE="${POST_ID} v${VERSION} [EXPERIMENTAL]"
          BODY="Draft — awaiting .scripts/attach-ctl.sh to build and attach the release archive (source + compiled .ctl) after local compile and hardware verification."

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes "$BODY" \
            --draft
        env:
          GH_TOKEN: ${{ github.token }}
